name: build-natives

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/scripts/build-natives.sh'
      - '.github/scripts/regenerate-manifest.sh'
      - '.github/scripts/regenerate-bindings.sh'
      - '.github/workflows/build-natives.yml'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            classifier: linux-x86_64
          - os: ubuntu-24.04-arm
            classifier: linux-aarch64
          - os: windows-2025
            classifier: windows-x86_64
            msystem: UCRT64
            msys_pkg: ucrt-x86_64
          - os: windows-11-arm
            classifier: windows-aarch64
            msystem: CLANGARM64
            msys_pkg: clang-aarch64
          - os: macos-13
            classifier: darwin-x86_64
          - os: macos-14
            classifier: darwin-aarch64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y --no-install-recommends \
            build-essential autoconf automake libtool pkg-config \
            nasm yasm cmake git python3

      - name: Install macOS deps
        if: runner.os == 'macOS'
        run: |
          brew update
          brew install autoconf automake libtool pkg-config nasm yasm cmake

      - name: Install MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            git
            autoconf
            automake
            libtool
            pkg-config
            make
            mingw-w64-${{ matrix.msys_pkg }}-toolchain
            mingw-w64-${{ matrix.msys_pkg }}-cmake
            mingw-w64-${{ matrix.msys_pkg }}-nasm
            mingw-w64-${{ matrix.msys_pkg }}-yasm

      - name: Build natives
        shell: ${{ runner.os == 'Windows' && 'msys2 {0}' || 'bash' }}
        run: bash .github/scripts/build-natives.sh

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: natives-${{ matrix.classifier }}
          path: modules/lib/dependencies/*/bin/${{ matrix.classifier }}/

      - name: Upload vendored headers (linux-x86_64 only)
        if: matrix.classifier == 'linux-x86_64'
        uses: actions/upload-artifact@v4
        with:
          name: vendored-headers
          path: modules/lib/dependencies/*/headers/

  commit:
    needs: build
    runs-on: ubuntu-latest
    env:
      JEXTRACT_VERSION: '22'
      JEXTRACT_BUILD: '5-33'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          pattern: natives-*
          path: artifacts/

      - uses: actions/download-artifact@v4
        with:
          name: vendored-headers
          path: artifacts/headers/

      - name: Stage binaries and headers into the tree
        run: |
          set -e
          for d in artifacts/natives-*/; do
            cp -r "$d"* modules/lib/dependencies/
          done
          cp -r artifacts/headers/* modules/lib/dependencies/

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - name: Cache jextract
        id: jextract-cache
        uses: actions/cache@v4
        with:
          path: tools/jextract
          key: jextract-${{ env.JEXTRACT_VERSION }}-${{ env.JEXTRACT_BUILD }}-linux-x64

      - name: Install jextract
        if: steps.jextract-cache.outputs.cache-hit != 'true'
        run: |
          set -e
          mkdir -p tools
          url="https://download.java.net/java/early_access/jextract/${JEXTRACT_VERSION}/${JEXTRACT_BUILD%%-*}/openjdk-${JEXTRACT_VERSION}-jextract+${JEXTRACT_BUILD}_linux-x64_bin.tar.gz"
          echo "Downloading $url"
          curl -fsSL "$url" -o /tmp/jextract.tar.gz
          tar -xzf /tmp/jextract.tar.gz -C tools/
          mv "tools/jextract-${JEXTRACT_VERSION}" tools/jextract

      - name: Regenerate Java bindings
        env:
          JEXTRACT_HOME: ${{ github.workspace }}/tools/jextract
        run: bash .github/scripts/regenerate-bindings.sh

      - name: Regenerate manifest
        run: bash .github/scripts/regenerate-manifest.sh

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A \
            modules/lib/dependencies \
            modules/lib/src/main/java \
            modules/lib/src/main/resources/META-INF/native-checksums.json
          if git diff --staged --quiet; then
            echo "no native or bindings changes to commit"
          else
            git commit -m "Rebuild native dependencies + regenerate bindings [skip ci]"
            git push
          fi
